{% extends 'base.html' %}
{% block content %}

<h2>Admin Dashboard</h2>

<h4>Users</h4>
<table class="table table-bordered">
<tr><th>ID</th><th>Username</th></tr>
{% for u in users %}
<tr><td>{{u[0]}}</td><td>{{u[1]}}</td></tr>
{% endfor %}
</table>

<h4>Feedback</h4>
<table class="table table-bordered">
<tr><th>ID</th><th>Message</th></tr>
{% for f in feedback %}
<tr><td>{{f[0]}}</td><td>{{f[1]}}</td></tr>
{% endfor %}
</table>

{% endblock %}
